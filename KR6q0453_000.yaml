front:
  text: 耳庵禪師語録序達磨西來不立文字直指人心見性成佛今撰述之家汗牛充棟非文字耶不寧惟是一千七百則非文字耶所以然者黠慧日增真純日減才涉義路便將意識摶量説心説性反成障礙故爾設立種種機用換人眼目直待情枯技盡始現髻珠此皆從上諸凍儂不得已之婆心也今撰述之家能具此不得已之心者有幾人耶幸得一人焉曰西蜀耳庵禪師乃徑山大慧十六世孫而趙州三巴掌和尚之高弟掌和尚以幽燕傑士混迹黑窯廠中胸中不著一元字腳亦不知何等為佛法無端發起廣大疑團求明向上東敲西磕撞入聚雲門下三遭痛掌頓徹心源以此三巴掌之名喧動楚蜀當是時濟下枝屬法席如雲耳師莫適往也獨依掌和尚以居即掌和尚亦嘗三坐道場位下龍象指不勝屈莫適許可也獨以衣鉢囑師此其師資相契固有出於語言文字之外者矣師出世後歷住伏虎熊耳等四大剎所存語録寥寥數言皆真實諦當如人食少金剛要當穿皮而出真不可作文字觀也後之讀師録者當知佛法不從他得求明此事須如金翅擘海直取龍吞庶不負耳師父子潛行救世之婆心也哉檇李雙桂居士徐善槃談撰
