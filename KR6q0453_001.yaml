body:
  text: 書記性愷編順治六年十月十五日湖廣施州衛三渡屯觀音山熊耳庵祗園檀越陳化宇院主文旨秉本堂巴掌和尚遺命請師上堂師至座前以拄杖豎起云撑天拄地以拄杖橫擔云日月平挑以拄杖敲三下云七橫八縱且道向上一著聻遂升座拈香祝聖畢次拈香云此瓣香拄杖身中生馥郁拂子頭上靄煙雲爇向爐中供養三巴掌先師上鐵下眉和尚用酬法乳之恩維那白槌師豎拂子云説甚麼第一義只這個東西干戈擾亂不得刀斧琢削不能雖當世局亂離依然瀟灑無礙今日落在山僧手中憑此為先師出氣還有旁不甘底麼良久衆無出者師乃云百尺竿頭流赤水蟭螟眼淚哭雙疼葫蘆好似冬瓜樣一番舉起一番新喝一喝僧出云喝個甚麼師云庭前乘竹馬進云落在甚處師云山外月光生維那再白槌師下座茶話舉杯云若喚作茶欺三世佛祖不喚作茶背趙州公案畢竟喚作甚麼放杯撫掌三下禮巴掌本師真天道無知俾四序以遷移地道無知俾山獄而傾頽人生雖有南北佛性豈説參差既全體而有托豈針鉢之難期熱淚含哺千古腹冷眼常看一枝遺師歸師歸甘纍不肖男兒歸伏虎庵示衆腳跛眼瞎全沒搭撒大家團圞頭共説無生話説甚無生話恰參祝髮師祖祝髮本宗海印寬洪豈料後代兒孫冤纍重重縱有鐵石心肝也須七花八裂還委悉麼為本師畢九拈香九九八十一古今同此曆吾師無去來分明只這是遂著香爐中檀越修善請覲表師舉古德云我有一機瞬目視伊若然不信更喚沙彌山僧則不然我有一用牛拖鬼弄人若肯信全然無縫既是無縫表個甚麼有貨不愁貧師與靈嚴茶次師拈一莖蕨云上方還有這個麼嚴云有師云雖有那能當頓嚴云作麼生喫師云忙時百咂碎間時囫圇吞嚴云九九八十一師呵呵大笑一僧看空空偈師云這些空空那個是真僧云俱不是師云看他作麼僧無語旁僧舉手師打云桑樹著箭柳樹出漿僧問如何是動師參前如何是靜師佇立不動不靜時如何師云口在甚麼處順治七年九月十五日忠路宣慰司期主冉斯榮請師住金福山回龍禪院至山門卓拄杖云透開無量法門顯出諸人鼻孔到此合作麼生以手打圓相隨身直入至佛殿云乾屎橛麻三斤不識好惡底妄自標名顯字山僧則不然乃展具三禮至方丈云東看則西南觀成北就中有個機關喝一喝云虛空腦裂至座前撫掌云三世諸佛歷代祖師都在山僧手中粉碎了也汝等諸人作麼生折合升座拈香畢復拈香云彌天漫地用實顯真觸殺佛祖命根灼破人天正眼供養臨濟二十六代巴掌先師用酬法乳僧問赤幟高懸雲水驟集未審回龍庵中有甚消息師云玉馬堆中能社舞進云諸人分中又作麼生師云歡歌林裡落霞飛僧問如何是斬新一句師云旃檀海岸飛白雪進云向後如何師云無礙香雲匝地鋪僧禮拜師拈拄杖卓一卓云木上座在曲彔床頭放光動地止恐諸人眼見如聾耳聽若啞今日山僧接衆開堂不辭拈出還有不受瞞底麼復卓一卓下元會上堂僧問世尊初生手指天地因甚雲門要打殺師云蝦蟆吞大象僧作禮師云好個賊頭僧問回龍庵中獅子吼利害在甚麼處師云天寒到處冷進云如何得喚醒諸人師云雪壓紫芝低僧歸位師云山僧今被汝等搬弄一上不免打樣裝模去也以拂子畫相云凡情上達大圓鏡莫不是炳炬焚檀因時慶祝為凡情耶良久云打破鏡來與汝相見上堂僧問如何是溈仰宗師云合取狗口如何是曹洞宗師云開門合眼看如何是雲門宗師云高嚴滴水如何是法眼宗師云只這是進云那一宗聻師打云嚴風正凍依稀雪嶺山中玉霰旋飄倣佛熊耳峰畔山僧昨夜把大海龍王一摑血流滿地鱗甲片飛散入五門今朝分作宗旨但不知頷下驪珠落在阿誰手裡一僧作呈珠勢師便打進云疾不疾師復打僧禮拜師云連棒打破花腔鼓肚內何曾有半分下座月下設茶衆請開示維那問靈山畫月曹溪指月與金山夜月是同是別師云一雙箸子兩邊分進云和尚分中還有圓缺否師便喝進云究竟如何師云覺來遊戲非遊戲老胡擔著間家具波斯夜半嚼寒水説與諸人猶不識若也識得雲裡帝城雙鳳闕其或未然雨中春樹萬人家茶話僧問雲門趙州即不問善惡不相涉還該句也無師云泥龍入海經濟事進云未出方丈意如何師云火裡藏水雅致殊進云恭賀和尚萬福師默然復舉川禪師云終日忙忙那事無妨不求解脫不樂天堂但能一念歸無念高步毗盧頂上行川老師未免墮坑落塹山僧則不然終日忙忙那事須防觸著磕著總是尋常但得眉毛分八字娑婆何地非西方山僧恁麼道還有出身處也無喝一喝云向道莫行山下路果聞猿叫斷腸聲鳳衛侯誦經祈禳請上堂師以拂子敲禪床三下云有佛即有法有法即有僧三寶最吉祥是真歸仗處既然如是延生一句合作麼生良久云鞞殺社鞞殺社鞞殺逝三沒揭諦娑訶茶話僧問如何是未開口時消息師云雲從風裡亂進云末後句如何師云再問即不堪僧喝師云一聲花鼓動正是滿園春復以拄杖畫相云佛真法身猶若虛空應物現形如水中月還有具眼底麼不離當處常湛然覓即知君不可見解制上堂僧問一陽才動百竅已驚如何是結師云汝蚤合恁麼問進云如何是解師云東風吹柳蕙進云不解不結時如何師云要知端的意日影上闌干僧問夾山點頭三下正恁麼時見個甚麼師云破沙盆裡爛冬瓜進云作麼保任師云鐵烏龜撞著胡錐子僧禮拜師乃云熊耳庵中天花散回龍寺裡散天花不是山僧赤骨立雪裡梅開第一家古人有結謂之制山僧制盡謂之解到處弘開社火場烹殺佛祖與魔王放去任從千萬里收來仍是舊家鄉傳與諸方達道者莫從解結較短長以拂子作花巾勢云會麼贊衡居士取法名小參雨下地兮雲在天紅塵堆裡種白蓮了得世緣無罣礙方知柏子樹庭前畫相云毛端開口笑成佛有何難分付燈成直下薦取示衆舉古德云趙州東院西密室爛如泥竇八布衫破赤土畫簸箕喝一喝云是甚麼簷前雨滴滴雞向五更啼山僧不然靈峰北頭南牛欄沒半邊王三布褌破打出大泥團喝一喝云是甚麼掉頭峰上看不見五更天示衆今朝六月初一諸佛也須忌諱直饒伶俐衲僧最怕當頭一句那一句恰似東京王矮子屎臭屁示衆虛空栽鬚大海瀟灑金剛露柱同行駭得眉毛眼瞎舉扇云若無這個證盟幾乎笑殺大示衆汝等參學難逃悟與不悟其實不悟也度日如年悟也度日如年何故一月三十日示衆年來收得一隻破草鞋無可用處諸方如有慣拾金銀者莫到山僧門下示衆舉道吾云高不在絶頂富不在福嚴樂不在天堂苦不在地獄相識滿天下知心能幾人徑山即不然高在絶頂富在福嚴樂在天堂苦在地獄誰知席帽下元是昔愁人今日二老人高低落在靈峰山中也饒他不過各與三十拄杖罰出三門去若有人問汝等但道低聲低聲小參參禪人不悟病在妄認四大身中緣影為自心相被六根六塵六識牽引將去縱有話頭倏憶倏忘猶補這些孔眼不暇何常得功夫相應來總為生死心不切人我見不忘如人縫衣衣未破時先存其片幾時到片線俱無寸絲不挂露裸裸地你看僧問趙州狗子還有佛性也無州云無會得這無字省了多少氣力其或未然怪伊不得上堂羅漢走出三門土地卻歸正殿撞倒釋迦頻伽瓶直當王四家大鐵罐喝一喝示衆道不可須臾離也可離非道也既欲學道必須時時警惕刻刻提撕不然未免虛費光陰珍重示中和吳居士虛空為手須彌為棒打殺威音王蝦蟆來過狀不是左藏右藏幾乎打著鼻梁幸得居士致中致和相與解交去也且道這一狀阿誰領得示菩提鄭居士啐是甚麼烏龜跳出葛藤窩有時直上須彌頂菩提樹下娑婆訶阿呵呵會也麼我昨日問底是你你今日又道作麼作麼為巴掌本師設忌撫掌云拍碎虛空撥開正眼是和尚己事今日不肖兒郎又作麼生良久云東邊東行西邊西去南有南田北有北地若到十字街前任從諸人打去罵去師受請住天寧入院五峰山上懸明月天寧寺裡燦曇花箇中消息人難薦狸奴白牯共一家遂踴身云直下透重關示衆做工夫不得妙悟病在聰明靈利知解分析稱叟居士云可惜豫錯讀幾行書誤識幾箇字反將此事對面不逢所以世間第一等人作世間第一等文字而不能證超佛越祖一著子者未免被文字牽纏動落理障若也倒翻窠窟方知不即不離別有消息那時發出一段自然文章以視筆花墨浪不啻霄壤矣示衆巴掌先師曾從無文印子上打破透出千言萬語雖具甚深妙義蓋由老漢不本分而然今之不識字參禪者如癡貓守窟喚作做工夫錯過了也示衆古人云得意歸來好看書今人稍有一知半解便自歇去狂言妄語便道我能超佛越祖於古人入理深談淆訛公案全不問及安望其見到説到行到證到耶圓悟老人云學者不疑言句是為大病晦堂云借彼所長礪我所短豈無謂而云然哉學者不可不審頌古舉川禪師有江陵僧來參川問幾時發足江陵僧提起坐具川云謝子遠來下去僧繞禪床一匝便出川云若不恁麼爭知眼目端的僧撫掌云苦殺人洎合錯判諸方川云深得禪宗道理師頌云日面月面難逃勘辨南斗北斗也須著首何如海闊與天遙無絃琴上知音有舉僧問本覺禪師如何是道覺豎起拳云會麼僧云不會覺云拳頭也不識師頌云連頭帶尾一百八諸佛出來也難話你若還我草鞋錢我即酬你廬陵價徵古梵語妙奢摩他此云空觀師徵云直饒把三千大千世界碎為微塵有情無情人我四相色陰等物如空花如陽焰如尋香城空則不無且道作麼生觀梵語三摩鉢提此云假觀師徵云若十二類衆生六根六塵六識四大強弱生老病死外暨山河大地草木叢林雲從雨合電捲風馳彗孛飛流虛空世界悉皆是有假則假矣觀後如何梵語禪那此云中道觀師徵云見色非干色聞聲不是聲諸法不生不滅不垢不淨不增不減二六時中行住坐臥穿衣喫飯屙屎放尿喚作中得麼畢竟觀者阿誰速道速道別古舉雲門云扇子𨁝跳上三十三天觸著帝釋鼻孔東海鯉魚打一棒雨似盆傾會麼會麼師別云扇子不跳三十三天也觸著帝釋鼻孔東海鯉魚不喫棒也雨似盆傾用會作麼舉金剛經云若以色見我以音聲求我是人行邪道不能見如來師別云不以色見我不以聲求我是人行邪道不能見如來評古舉一僧辭常觀禪師觀云汝諸方去莫謗老僧在這裡僧云某甲不道和尚在這裡觀云汝道老僧在甚麼處僧豎一指觀云早是謗了也師評云一箇掩耳偷鈴一箇指鹿為馬正眼看來二俱失利代古舉石頭遷禪師問一新到僧在甚麼處來僧云江西來遷云見馬大師麼僧云見遷指一橛柴云馬師何似這箇僧無語師代云也須看破始得又云相隨來也法身偈青絲冉冉白頭禪惹得世人恨且嫌插竿頭上眉開眼非牛非馬亦非仙華嚴偈華嚴世界全騎牛不著鞭炭裡烏雞走梅花帶月圓東家人做葬西家人送錢瞌睡撞著枕是因是果是緣五宗頌磊磊落落老神仙一擘華山億萬年大鵬一舉三千里傾湫倒嶽不為顛南山起雲北山雨自古長江不繫船抑揚抬捺事紛紛不及當然一句親滿眼滿耳真消息隨機隨用絶留停岸回驚水急良馬見鞭行果是毗盧真教主何須纍劫更修因從來不向外邊行父子相知有幾人從體起用兮須知孺子攝用歸體兮必取老成窄路相逢人不語多時不遇有知音此處不從他處覓必須夢裡再還魂深宮不見五雲封夾路桃花滿樹紅粉墻白虎應須辨炭裡烏龜事莫窮仙女直如貧女好野人卻與主人同不言不語真君子一腔風月在其中知恩識義人間少反眼無情世上多鐵臉閻羅全不懼常將白眼看娑婆撩起便行兮卻為真子四野謳歌兮口似懸河一句任從三貫二莫教鷂子過新羅頌棒寂寂寥寥楖栗悠悠鬱鬱生枝橫拈倒弄兮逢場作戲放去收來兮鬼哭神啼忽然擊出虛空髓問取當人知不知知不知石火電光猶較遲頌喝忽然平地起雷霆駭得衲僧鼻眼橫膽落魂蘇人不識泥穿壁露孰為親縱奪無私兮有殺有活照用不二兮全主全賓一聲震落西江月豈同犬吠與驢鳴浪子禪説逢人便打這鼓笛叵耐胸中黑如漆卻於枝上強生枝自恃聰明逞靈利何曾踏著祖師關何曾悟入佛之智情知一橛嚇頭禪動地驚天為活計拈拳豎指妄施為影響那能窺端的隨群逐隊慣欺人滿腔徒自生荊棘或時間坐不談禪口鼓是非作兒戲可憐長慶七蒲團行腳趙州八十一少室九年不較遲懶安何懈牧牛志楊岐陋巷雪飄淋六祖曹溪混獵士看來直道今時強誰知今時不似昔古人箇箇學無為三大阿僧豈容易那似而今浪子禪蕩家失業無拘忌不惟不振祖家風生死關頭全不懼堪嗟吁長太息珍重禪流休自棄明頭暗頭踏實行天上人間稱如意坐禪針鐵脊胡床萬緣放下念念現成心心莫挂若使惺惺猿猴弄影若使寂寂鬼家活計非惺非寂廓兮無朕非不寂惺冥然罔應但歇情緣了元歸正正無所正那伽大定陋室銘小小一拳室風吹並雨滴中有沒量人渾身赤骨立莫言此室小此室納虛空虛空猶有量此室則無窮莫道茅簷短莫言四壁疏行住與坐臥卷舒得自如東倒復西倒左之並右之看看些子室廣廈亦何為自在吟有人問我西來意我道胸中無屎屁從來不會祖師禪從來不解如來義有時合著目前機便自明明睜兩眉有時放出一雙手掇得虛空顛倒走訶風罵雨且逍遙築著磕著三藤條裂破筋皮渾身血吞聲飲氣怨吾曹時人道我太粗哉我笑時人細末來都盧不識其中意解開布袋且寬懷笑且笑兮真不憨優遊自在沒拘攣呵呵拍掌阿誰也不是佛兮不是仙遊子歌劫濁臨頭事可憂烽煙一發滿天愁茫茫苦海人難渡且學無心伴白鷗白鷗一去復還來誰把紅塵掃得開唯有悠悠間道者清風明月共徘徊明月清風兩俱奇水邊林下少人知時邀明月來我屋時喚清風吹我衣我衣渾素無塵色脫出而今搶攘劫著起飄然劫外行愁看山骨堆堆白白骨堆堆橫滿山行人處處嘆艱難兵戈載道猶如織那討吾儕半日間間來無事學採薇採得薇根一擔歸千槌萬棒無休歇一飽忘他百日飢飢瘡箇箇人皆有教你從頭親下手野人山中富貴饒大地山河吞一口四威儀行炭裡烏龜走雪上鷺鷥飛飛亦莫知其妙走亦莫知其竅妙竅奧乎其中吾不知電捲風馳者之胡為而然也腳跟下三十拄杖住良其背不獲其身行其庭不見其人而孰知身不得其向背人不落於中邊但與踢倒燈籠掀翻露柱在甚麼處安身立命凝然而莫為之擾也冥然而莫知其極也而猶謂住著則不可者果如斯而已乎坐平地起孤堆直使狂者定棼者鎮動者靜把前際後際已生未生一齊打斷那管他蘆穿膝上雀巢頂門而且曰一物亦不為也直箇蒲團也辜負他不得臥放下便平穩或時睡心睡目安覺安眠寐亦莫得其始覺亦莫得其終大千沙界渾一禪床清淨法身無容被蓋但不知無夢無想主人公在甚麼處夜半正明天曉不露誡衆割愛出家應須立志或遊湖山或居城市常自忖度一衣一食檀信脂膏菩薩行力施也甚難受也不易莫恣間談莫作兒戲光陰似箭如駒過隙頃刻無常痛心努力六根完全信心當植割愛辭親為著何事佛法難聞知識難遇涉水登山擔簦負笈參拜明師東來西去但到叢林件件精細粥飯隨緣威儀常具莫道人非莫言己是二六時中孳孳亟亟行業圓成功夫到地咬破話頭通身粉碎垂手為人慈悲願力莫因逆緣便生退息以此報恩以此自利不止自利而且普利乃稱出世丈夫不負出家初志示達本大德泥人便是鐵漢眉毛卻能挑擔有時鼻孔朝天所求無一不辦大本達道依然鴨子出自鴨蛋示如心禪人莫怪世人顛倒顛崑崙卻被鷺鷥牽如如不動心何有潦倒毗盧華藏間復寒雪法師巴掌已是當年露直至而今藏不住昨夜伏虎過菴前一腳踏翻娘生褲恁麼來無回互沒眼常將玉線穿無手卻把金針度等間一色映山川匝地紅輪誰敢顧勉太還勤舊春山青春水緑勸君莫把光陰負青山年年看有餘緑水時時聽不足聽不足箇中自有無生曲訪王靜主居庵人不識不識最相知山山隨我到處處任君歸不厭青山老不礙白雲飛珍重東村王長老東溪西溪休失便宜示學人居山塵情俱放下悠悠緑樹問出入不出入善惡莫生嫌此言若不信千山與萬山示衆善士修善獲善求福得福處處菩提行行道路無也若干有也沒數忽然觸著腦後腮許汝諸人有箇進步示中知禪人不知不覺從來爾蕩蕩空空無可擬若向其中著絲毫知上立知空負起或時逐浪與雲飛或去東來並西止是神是鬼是天仙六道三途無窮已塵塵剎剎剎塵塵剎剎塵塵塵復爾往來出入六門頭那識他咱與我你直須打破鬼門關脫脫落落沒依倚堂堂獨獨不居中處處知知沒元底附記耳庵和尚乃四川重慶府酆都縣毛氏子幼於本縣三姓庵祝髮賦性沖淡寡言笑多慈忍初習教乘聞吹萬老人樹幟忠州聚雲寺師參隨多載老人示寂鐵大師開法平都師又依棲有年後參巴掌和尚掌師收入記室嗣居上板凡掌師到處師皆與焉掌師臨終授以衣拂遂承子印住伏虎熊耳回龍天寧四剎一日祗園施主設會天寧師偶示微疾談笑自若常經行法筵中侍僧白曰和尚近日違和止宜尊重調攝師笑日施主信心可嘉吾特留數日為渠證盟耳事畢吾當去矣衆聞驚異又二日集衆告曰汝等以先師衣法送三山師弟處為我展轉求人汝等一並往參毋自辜負言訖而逝茶毗塔於天寧五峰山之陽壽四十六語録一卷流傳於世
